<svg width="860" height="150" viewBox="0 0 860 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00F2FE"/><stop offset=".5" stop-color="#4FACFE"/><stop offset="1" stop-color="#00FF87"/>
